<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Diário - Captação</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
            background: #f7fafc;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card h3 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 8px;
        }
        .stat-card p {
            color: #718096;
            font-size: 0.9em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: #667eea;
            color: white;
        }
        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }
        tbody tr:hover {
            background: #f7fafc;
        }
        .frente-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }
        .frente-captacao { background: #d4edda; color: #155724; }
        .frente-admin { background: #d1ecf1; color: #0c5460; }
        .frente-vendas { background: #fff3cd; color: #856404; }
        .frente-suporte { background: #f8d7da; color: #721c24; }
        .footer {
            padding: 24px;
            text-align: center;
            color: #718096;
            font-size: 0.9em;
            background: #f7fafc;
        }
        .github-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: #24292e;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9em;
        }
        .github-badge:hover {
            background: #444d56;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Relatório Diário</h1>
            <p>Aguardando primeira atualização automática...</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3>0</h3>
                <p>Total de Registros</p>
            </div>
            <div class="stat-card">
                <h3>0</h3>
                <p>Frentes Ativas</p>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Frente</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="2" style="text-align: center; padding: 40px; color: #718096;">
                        🤖 Este relatório será atualizado automaticamente todos os dias às 07:00
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="footer">
            <p>⚡ Atualizado automaticamente pelo Agente Toqan</p>
        </div>
    </div>
</body>
</html>
